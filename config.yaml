# =============================================================================
# config.yaml — wecode 项目配置文件
# =============================================================================
# 定义 AI 模型的连接参数、Agent 的行为模式以及可用工具的访问权限。
# 环境变量引用使用 ${VAR_NAME} 语法，加载时自动解析为实际值。
# =============================================================================

# ---------------------------------------------------------------------------
# 模型配置 (model)
# ---------------------------------------------------------------------------
# 定义 AI 模型的连接信息。支持 OpenAI 兼容接口的任何提供商。
model:
  provider: deepseek                # 模型提供商名称
  name: deepseek-v4-flash           # 模型名称（对应 API 的 "model" 字段）
  base_url: https://api.deepseek.com/v1  # API 基础地址
  api_key: ${DEEPSEEK_API_KEY}      # API 密钥（从环境变量读取，避免硬编码）

# ---------------------------------------------------------------------------
# Agent 行为配置 (agent)
# ---------------------------------------------------------------------------
agent:
  max_turns: 50                     # 最大对话轮数（防止工具调用无限循环）
  system_prompt: "You are a helpful beautiful kindly secretarial assistant with tool access, you can use tools to help me, your name is Wecode."
                                    # 系统提示词：定义 Agent 的角色和能力边界
  temperature: 0.3                  # 生成温度（0-1）
                                    # 低温 → 输出更确定（适合工具调用）
                                    # 高温 → 输出更多样（适合创意任务）

# ---------------------------------------------------------------------------
# 工具权限配置 (tools)
# ---------------------------------------------------------------------------
# 控制哪些工具对 Agent 可用。
# 注意：此配置目前被加载但未在 agent.py 中强制执行。
tools:
  enabled:
    - bash_execute                  # Shell 命令执行
    - read_file                     # 文件读取
    - web_fetch                     # 网页内容抓取
